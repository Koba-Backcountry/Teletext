name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v0.1.9
        with:
          host: ${{ secrets.EC2_IP }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            if [ ! -d "/home/ubuntu/Teletext" ]; then
              git clone https://github.com/Koba-Backcountry/Teletext.git /home/ubuntu/Teletext
            fi

            cd /home/ubuntu/Teletext
            git pull

            if ! command -v docker &> /dev/null; then
              sudo apt-get update
              sudo apt-get install -y docker.io docker-compose
            fi

            docker-compose down || true
            docker-compose up -d --build
