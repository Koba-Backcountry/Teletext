<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Teletext</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="login-page">

<!-- AUTH -->
<div id="auth">
    <div id="title">
        <h1>Georgian Teletext</h1>
        <h2>Powered by Koba Skhulukhia</h2>
    </div>
    <input id="u" placeholder="username">
    <input id="p" placeholder="password" type="password">
    <button onclick="login()">Login</button>
    <button onclick="register()">Register</button>
    <div id="msg"></div>
</div>

<!-- TELETEXT -->
<div id="container" style="display:none;"></div>

<!-- ADMIN -->
<div id="admin" style="display:none;">
    <div id="admin-wrapper">

        <!-- HEADER -->
        <div id="admin-header">
            <div id="admin-logo">
                <span class="logo-gt">GT</span>
                <div>
                    <div class="logo-title">Georgian Teletext</div>
                    <div class="logo-sub">Admin Panel</div>
                </div>
            </div>
            <button id="logout-btn" onclick="logout()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                Logout
            </button>
        </div>

        <!-- MAIN GRID -->
        <div id="admin-grid">

            <!-- LEFT: USER MANAGEMENT -->
            <div class="admin-section" id="users-section">
                <div class="section-header">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                    User Management
                </div>

                <div class="users-columns">
                    <div class="users-col">
                        <div class="col-label pending-label">
                            <span class="dot dot-pending"></span>
                            Pending
                            <span class="count-badge" id="pending-count">0</span>
                        </div>
                        <div id="pendingList" class="user-list"></div>
                    </div>

                    <div class="col-divider"></div>

                    <div class="users-col">
                        <div class="col-label approved-label">
                            <span class="dot dot-approved"></span>
                            Approved
                            <span class="count-badge" id="approved-count">0</span>
                        </div>
                        <div id="approvedList" class="user-list"></div>
                    </div>
                </div>
            </div>

            <!-- RIGHT: SETTINGS -->
            <div class="admin-section" id="settings-section">
                <div class="section-header">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93l-1.41 1.41M4.93 4.93l1.41 1.41M12 2v2m0 16v2m7.07-5.07l-1.41-1.41M5.34 18.66l1.41-1.41M2 12h2m16 0h2"/></svg>
                    Admin Settings
                </div>

                <div class="settings-form">
                    <label class="field-label">New Username</label>
                    <input id="newUser" placeholder="Enter new username" class="admin-input">

                    <label class="field-label">New Password</label>
                    <input id="newPass" placeholder="Enter new password" type="password" class="admin-input">

                    <button class="save-btn" onclick="updateAdmin()">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                        Save Changes
                    </button>
                    <div id="admin-msg"></div>
                </div>
            </div>

        </div>
    </div>
</div>

<script>
let direction = 1;
let position = 0;

const API = "http://" + window.location.hostname + ":8000";

window.onload = function() {
    document.getElementById("auth").style.display = "block";
    document.getElementById("container").style.display = "none";
    document.getElementById("admin").style.display = "none";
    localStorage.removeItem("logged");
}

async function login() {
    const res = await fetch(API + "/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ username: u.value, password: p.value })
    });

    const data = await res.json();
    document.body.className = "teletext-page";

    if (data.status === "ok") {
        localStorage.setItem("logged", "1");
        document.getElementById("auth").style.display = "none";

        if (data.is_admin === 1) {
            document.getElementById("container").style.display = "none";
            document.getElementById("admin").style.display = "block";
            loadPendingUsers();
        } else {
            document.getElementById("admin").style.display = "none";
            document.getElementById("container").style.display = "block";
            loadMatches();
            scrollLoop();
            setInterval(loadMatches, 90000);
        }
    } else {
        msg.innerText = data.status;
    }
}

async function register() {
    const res = await fetch(API + "/register", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ username: u.value, password: p.value })
    });
    const data = await res.json();
    msg.innerText = data.status;
}

async function setPending(id) {
    await fetch(API + "/set-pending/" + id, { method: "POST" });
    loadPendingUsers();
}

async function loadPendingUsers() {
    const pendingRes = await fetch(API + "/pending-users");
    const pendingData = await pendingRes.json();

    const approvedRes = await fetch(API + "/approved-users");
    const approvedData = await approvedRes.json();

    document.getElementById("pending-count").textContent = pendingData.length;
    document.getElementById("approved-count").textContent = approvedData.length;

    const pendingList = document.getElementById("pendingList");
    const approvedList = document.getElementById("approvedList");

    pendingList.innerHTML = "";
    approvedList.innerHTML = "";

    if (pendingData.length === 0) {
        pendingList.innerHTML = '<div class="empty-state">No pending users</div>';
    }

    pendingData.forEach(u => {
        const div = document.createElement("div");
        div.className = "user-card";
        div.innerHTML = `
            <div class="user-avatar">${u.username[0].toUpperCase()}</div>
            <span class="user-name">${u.username}</span>
            <button class="action-btn approve-btn" onclick="approveUser(${u.id})">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
                Approve
            </button>
        `;
        pendingList.appendChild(div);
    });

    if (approvedData.length === 0) {
        approvedList.innerHTML = '<div class="empty-state">No approved users</div>';
    }

    approvedData.forEach(u => {
        const div = document.createElement("div");
        div.className = "user-card";
        div.innerHTML = `
            <div class="user-avatar approved-avatar">${u.username[0].toUpperCase()}</div>
            <span class="user-name">${u.username}</span>
            <button class="action-btn revoke-btn" onclick="setPending(${u.id})">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                Revoke
            </button>
        `;
        approvedList.appendChild(div);
    });
}

function logout() {
    localStorage.removeItem("logged");
    document.body.className = "login-page";
    document.getElementById("auth").style.display = "block";
    document.getElementById("container").style.display = "none";
    document.getElementById("admin").style.display = "none";
}

async function approveUser(id) {
    await fetch(API + "/approve/" + id, { method: "POST" });
    loadPendingUsers();
}

async function loadMatches() {
    const res = await fetch(API + "/matches");
    const data = await res.json();

    const container = document.getElementById("container");
    container.innerHTML = "";

    let lastLeague = null;

    data.forEach(m => {
        if (m.league !== lastLeague) {
            lastLeague = m.league;

            const header = document.createElement("div");
            header.className = "row";
            header.style.background = "#000000";

            header.innerHTML = `
                <div style="display:flex; align-items:center; gap:10px;">
                    ${m.flag ? `<img class="flag" src="Flags/${m.flag}">` : ""}
                    <div class="league">
                        ${m.country ? m.country + " - " : ""}${m.league}
                    </div>
                </div>
                <div style="margin-left:auto;">
                    ${m.sport_icon ? `<img class="icon" src="SportIcons/${m.sport_icon}">` : ""}
                </div>
            `;
            container.appendChild(header);
        }

        const row = document.createElement("div");
        row.className = "row";

        if (m.sport_icon === "Hockey.gif") {
            row.style.background = "#CBEAED";
            row.style.color = "#0000FF";
        } else if (m.sport_icon === "Basketball.gif") {
            row.style.background = "#AE7C44";
            row.style.color = "#FFFFFF";
        } else if (m.sport_icon === "Tennis.gif") {
            row.style.background = "#004000";
            row.style.color = "#FFFFFF";
        }

        row.innerHTML = `
            <div class="minute">
                ${m.source === "betcity"
                    ? `<img src="SportIcons/flash.gif" style="height:24px;">`
                    : m.minute}
            </div>
            <div class="team1">${m.team1}</div>
            <div class="score">${m.score}</div>
            <div class="team2">${m.team2}</div>
        `;
        container.appendChild(row);
    });
}

async function updateAdmin() {
    const res = await fetch(API + "/admin/update", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ username: newUser.value, password: newPass.value })
    });
    const data = await res.json();
    const msg = document.getElementById("admin-msg");
    msg.textContent = data.status === "ok" ? "✓ Saved successfully" : "Error: " + data.status;
    msg.className = data.status === "ok" ? "admin-msg-ok" : "admin-msg-err";
}

function scrollLoop() {
    const container = document.getElementById("container");
    position += direction * 0.5;
    container.style.top = -position + "px";
    const maxScroll = container.offsetHeight - window.innerHeight;
    if (position >= maxScroll) direction = -1;
    if (position <= 0) direction = 1;
    requestAnimationFrame(scrollLoop);
}
</script>

</body>
</html>
